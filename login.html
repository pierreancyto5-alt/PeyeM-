<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PEYEM – Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050b18;--surface:#0d1a2e;--blue:#0a84ff;--cyan:#00d4ff;--accent:#64ffda;--text:#e8f1ff;--muted:#7a93b5;--border:rgba(10,132,255,0.18);--blue-grad:linear-gradient(135deg,#0a84ff,#2563eb);--glow:0 0 40px rgba(10,132,255,0.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(10,132,255,.14) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(0,212,255,.09) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:400px}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:.15em;background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.7rem;letter-spacing:.2em;color:var(--muted);margin-top:4px;text-transform:uppercase}
.card{background:rgba(13,26,46,.85);border:1px solid var(--border);border-radius:20px;padding:28px 24px;backdrop-filter:blur(16px);box-shadow:var(--glow)}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:6px}
.card-sub{color:var(--muted);font-size:.82rem;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.7rem;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.field input{width:100%;background:rgba(10,132,255,.06);border:1px solid var(--border);border-radius:11px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:all .2s}
.field input:focus{border-color:var(--blue);background:rgba(10,132,255,.1);box-shadow:0 0 0 3px rgba(10,132,255,.1)}
.field input::placeholder{color:rgba(122,147,181,.4)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:48px}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:4px}
.btn{width:100%;padding:15px;background:var(--blue-grad);border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.07em;cursor:pointer;transition:all .25s;box-shadow:0 8px 28px rgba(10,132,255,.35);margin-top:4px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.err-box{display:none;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.25);border-radius:10px;padding:11px 14px;font-size:.8rem;color:#ff6b6b;margin-bottom:14px}
.err-box.show{display:block}
.divider{height:1px;background:var(--border);margin:20px 0}
.help-text{text-align:center;font-size:.78rem;color:var(--muted);line-height:1.6}
.help-text a{color:var(--blue);text-decoration:none}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.wa-link{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;background:#25d366;color:#fff;padding:11px;border-radius:12px;text-decoration:none;font-weight:600;font-size:.82rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap">
    <div class="logo">PEYEM</div>
    <div class="logo-sub">Virtual Card · Secure Login</div>
  </div>
  <div class="card">
    <div class="card-title">Konekte nan Kont Ou</div>
    <div class="card-sub">Antre nimewo telefòn ak modpas ou pou wè kat ou.</div>
    <div class="err-box" id="errBox"></div>
    <div class="field">
      <label>Nimewo Telefòn</label>
      <input type="tel" id="phone" placeholder="509 XX XX XXXX"/>
    </div>
    <div class="field">
      <label>Modpas</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Modpas ou"/>
        <button class="pw-eye" onclick="toggle
